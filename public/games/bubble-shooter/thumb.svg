<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180">
  <rect width="320" height="180" fill="#0f0f2e"/>
  <!-- Bubbles top rows -->
  <circle cx="50" cy="30" r="20" fill="#ff4444"/><circle cx="44" cy="24" r="6" fill="#fff" opacity="0.3"/>
  <circle cx="90" cy="30" r="20" fill="#44aaff"/><circle cx="84" cy="24" r="6" fill="#fff" opacity="0.3"/>
  <circle cx="130" cy="30" r="20" fill="#ffdd00"/><circle cx="124" cy="24" r="6" fill="#fff" opacity="0.3"/>
  <circle cx="170" cy="30" r="20" fill="#44dd44"/><circle cx="164" cy="24" r="6" fill="#fff" opacity="0.3"/>
  <circle cx="210" cy="30" r="20" fill="#ff4444"/><circle cx="204" cy="24" r="6" fill="#fff" opacity="0.3"/>
  <circle cx="250" cy="30" r="20" fill="#cc44ff"/><circle cx="244" cy="24" r="6" fill="#fff" opacity="0.3"/>
  <circle cx="290" cy="30" r="20" fill="#44aaff"/><circle cx="284" cy="24" r="6" fill="#fff" opacity="0.3"/>
  <!-- Row 2 offset -->
  <circle cx="70" cy="64" r="20" fill="#44dd44"/><circle cx="64" cy="58" r="6" fill="#fff" opacity="0.3"/>
  <circle cx="110" cy="64" r="20" fill="#ffdd00"/><circle cx="104" cy="58" r="6" fill="#fff" opacity="0.3"/>
  <circle cx="150" cy="64" r="20" fill="#44aaff"/><circle cx="144" cy="58" r="6" fill="#fff" opacity="0.3"/>
  <circle cx="190" cy="64" r="20" fill="#ff4444"/><circle cx="184" cy="58" r="6" fill="#fff" opacity="0.3"/>
  <circle cx="230" cy="64" r="20" fill="#44dd44"/><circle cx="224" cy="58" r="6" fill="#fff" opacity="0.3"/>
  <circle cx="270" cy="64" r="20" fill="#cc44ff"/><circle cx="264" cy="58" r="6" fill="#fff" opacity="0.3"/>
  <!-- Shooter at bottom -->
  <circle cx="160" cy="155" r="24" fill="#334155"/>
  <circle cx="160" cy="155" r="20" fill="#44aaff"/>
  <circle cx="154" cy="149" r="6" fill="#fff" opacity="0.3"/>
  <!-- Aim line -->
  <line x1="160" y1="133" x2="130" y2="80" stroke="white" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <text x="160" y="178" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#44aaff">BUBBLE SHOOTER</text>
