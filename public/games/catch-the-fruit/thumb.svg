<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="peach" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf2e3"/>
      <stop offset="100%" style="stop-color:#ffe0c0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#peach)"/>
  <!-- falling fruit -->
  <g stroke="#2ecc71" stroke-width="0">
    <circle cx="110" cy="70" r="22" fill="#e74c3c"/>
    <ellipse cx="113" cy="46" rx="8" ry="5" fill="#2ecc71"/>
    <circle cx="210" cy="110" r="22" fill="#f1c40f"/>
    <ellipse cx="213" cy="86" rx="8" ry="5" fill="#2ecc71"/>
    <circle cx="300" cy="60" r="22" fill="#9b59b6"/>
    <ellipse cx="303" cy="36" rx="8" ry="5" fill="#2ecc71"/>
  </g>
  <!-- bomb -->
  <circle cx="150" cy="140" r="20" fill="#2c3e50"/>
  <circle cx="143" cy="133" r="6" fill="#7f8c8d"/>
  <line x1="150" y1="120" x2="157" y2="110" stroke="#8b5a2b" stroke-width="3"/>
  <circle cx="158" cy="108" r="4" fill="#f39c12"/>
  <!-- basket -->
  <rect x="250" y="185" width="90" height="34" fill="#8b5a2b"/>
  <rect x="250" y="185" width="90" height="8" fill="#a9744f"/>
  <g stroke="#6b4423" stroke-width="2">
    <line x1="268" y1="193" x2="268" y2="219"/>
    <line x1="286" y1="193" x2="286" y2="219"/>
    <line x1="304" y1="193" x2="304" y2="219"/>
    <line x1="322" y1="193" x2="322" y2="219"/>
  </g>
  <rect x="0" y="248" width="400" height="52" fill="#e67e22"/>
  <text x="200" y="282" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">Catch the Fruit</text>
</svg>
