<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180">
  <rect width="320" height="180" fill="#4a7c59"/>
  <!-- Road lane -->
  <rect x="0" y="110" width="320" height="40" fill="#555"/>
  <line x1="0" y1="130" x2="320" y2="130" stroke="#aaa" stroke-width="1" stroke-dasharray="20,15"/>
  <!-- River lane -->
  <rect x="0" y="60" width="320" height="40" fill="#1a6b9a"/>
  <!-- Logs -->
  <rect x="20" y="68" width="80" height="24" rx="8" fill="#8b5e3c"/>
  <rect x="180" y="68" width="80" height="24" rx="8" fill="#8b5e3c"/>
  <!-- Cars -->
  <rect x="50" y="118" width="60" height="24" rx="6" fill="#ff4444"/>
  <rect x="56" y="122" width="20" height="14" fill="#aaddff"/>
  <rect x="200" y="118" width="50" height="24" rx="6" fill="#44aaff"/>
  <!-- Safe zones -->
  <rect x="0" y="148" width="320" height="32" fill="#3a6b1a"/>
  <!-- Chicken (player) -->
  <ellipse cx="160" cy="100" rx="14" ry="18" fill="#fff"/>
  <ellipse cx="160" cy="88" rx="8" ry="8" fill="#ff6666"/>
  <circle cx="164" cy="87" r="2" fill="#000"/>
  <polygon points="155,92 165,92 160,98" fill="#ffdd00"/>
  <text x="160" y="175" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="white">CROSSY ROAD</text>
</svg>
