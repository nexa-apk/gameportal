<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#7dd3fc"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#sky)"/>
  <!-- Clouds -->
  <ellipse cx="80" cy="50" rx="40" ry="20" fill="white" opacity="0.8"/>
  <ellipse cx="110" cy="44" rx="30" ry="18" fill="white" opacity="0.8"/>
  <ellipse cx="300" cy="70" rx="35" ry="16" fill="white" opacity="0.8"/>
  <ellipse cx="330" cy="65" rx="28" ry="15" fill="white" opacity="0.8"/>
  <!-- Ground -->
  <rect x="0" y="260" width="400" height="40" fill="#84cc16"/>
  <rect x="0" y="258" width="400" height="6" fill="#65a30d"/>
  <!-- Pipe top -->
  <rect x="280" y="0" width="60" height="140" fill="#22c55e"/>
  <rect x="272" y="128" width="76" height="20" rx="4" fill="#16a34a"/>
  <!-- Pipe bottom -->
  <rect x="280" y="200" width="60" height="100" fill="#22c55e"/>
  <rect x="272" y="196" width="76" height="20" rx="4" fill="#16a34a"/>
  <!-- Pipe left (partial) -->
  <rect x="90" y="0" width="60" height="90" fill="#22c55e"/>
  <rect x="82" y="78" width="76" height="20" rx="4" fill="#16a34a"/>
  <rect x="90" y="170" width="60" height="130" fill="#22c55e"/>
  <rect x="82" y="166" width="76" height="20" rx="4" fill="#16a34a"/>
  <!-- Bird body -->
  <circle cx="185" cy="152" r="26" fill="#fbbf24"/>
  <circle cx="193" cy="148" r="8" fill="white"/>
  <circle cx="196" cy="148" r="5" fill="#1e3a5f"/>
  <polygon points="209,152 224,148 209,158" fill="#f97316"/>
  <!-- Bird wing -->
  <ellipse cx="176" cy="162" rx="14" ry="8" fill="#f59e0b" transform="rotate(-20, 176, 162)"/>
  <!-- Score -->
  <text x="200" y="40" text-anchor="middle" fill="white" font-family="Arial" font-size="36" font-weight="bold" stroke="#0369a1" stroke-width="2">3</text>
  <!-- Title -->
  <text x="200" y="292" text-anchor="middle" fill="#1e3a5f" font-family="Arial, sans-serif" font-size="22" font-weight="bold" letter-spacing="2">FLAPPY BIRD</text>
</svg>
