<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180">
  <rect width="320" height="180" fill="#1a0a00"/>
  <!-- Fruits -->
  <circle cx="80" cy="100" r="30" fill="#ff4444"/>
  <circle cx="73" cy="93" r="10" fill="#ff6666" opacity="0.4"/>
  <circle cx="200" cy="80" r="25" fill="#ff9900"/>
  <circle cx="194" cy="74" r="8" fill="#ffbb44" opacity="0.4"/>
  <circle cx="140" cy="120" r="22" fill="#44dd44"/>
  <circle cx="135" cy="114" r="7" fill="#88ff88" opacity="0.4"/>
  <!-- Slash line -->
  <line x1="30" y1="150" x2="270" y2="40" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <!-- Juice splatter -->
  <circle cx="82" cy="98" r="5" fill="#ff2222"/>
  <circle cx="95" cy="88" r="4" fill="#ff2222"/>
  <circle cx="70" cy="85" r="3" fill="#ff2222"/>
  <circle cx="202" cy="78" r="4" fill="#ffbb00"/>
  <circle cx="215" cy="68" r="3" fill="#ffbb00"/>
  <!-- Sliced halves -->
  <ellipse cx="215" cy="65" rx="12" ry="15" fill="#ff9900" transform="rotate(-30 215 65)"/>
  <ellipse cx="230" cy="55" rx="12" ry="15" fill="#ffcc44" transform="rotate(-30 230 55)"/>
  <text x="160" y="170" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#ff9900">FRUIT NINJA</text>
</svg>
