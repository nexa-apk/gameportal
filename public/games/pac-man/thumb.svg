<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180">
  <rect width="320" height="180" fill="#000055"/>
  <!-- Maze walls -->
  <rect x="0" y="0" width="320" height="180" fill="#000055"/>
  <!-- Dots -->
  <circle cx="40" cy="40" r="4" fill="white"/>
  <circle cx="80" cy="40" r="4" fill="white"/>
  <circle cx="120" cy="40" r="4" fill="white"/>
  <circle cx="200" cy="40" r="4" fill="white"/>
  <circle cx="240" cy="40" r="4" fill="white"/>
  <circle cx="280" cy="40" r="4" fill="white"/>
  <circle cx="40" cy="90" r="4" fill="white"/>
  <circle cx="280" cy="90" r="4" fill="white"/>
  <!-- Power pellets -->
  <circle cx="40" cy="140" r="8" fill="white"/>
  <circle cx="280" cy="140" r="8" fill="white"/>
  <!-- Walls -->
  <rect x="150" y="20" width="20" height="50" rx="3" fill="#0000aa"/>
  <rect x="100" y="60" width="50" height="15" rx="3" fill="#0000aa"/>
  <rect x="170" y="60" width="50" height="15" rx="3" fill="#0000aa"/>
  <!-- Pac-Man -->
  <path d="M 140 90 L 170 80 A 30 30 0 1 0 170 100 Z" fill="#ffff00"/>
  <!-- Ghost 1 (red) -->
  <ellipse cx="220" cy="90" rx="18" ry="20" fill="#ff0000"/>
  <rect x="202" y="90" width="36" height="15" fill="#ff0000"/>
  <polygon points="202,105 209,98 216,105 223,98 230,105 237,98 238,105" fill="#ff0000"/>
  <ellipse cx="213" cy="85" rx="6" ry="7" fill="white"/>
  <ellipse cx="227" cy="85" rx="6" ry="7" fill="white"/>
  <circle cx="215" cy="85" r="3" fill="#0000ff"/>
  <circle cx="229" cy="85" r="3" fill="#0000ff"/>
  <!-- Title -->
  <text x="160" y="165" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#ffff00">PAC-MAN</text>
</svg>
