<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180">
  <rect width="320" height="180" fill="#000"/>
  <!-- Center line -->
  <line x1="160" y1="10" x2="160" y2="30" stroke="#444" stroke-width="3"/>
  <line x1="160" y1="50" x2="160" y2="70" stroke="#444" stroke-width="3"/>
  <line x1="160" y1="90" x2="160" y2="110" stroke="#444" stroke-width="3"/>
  <line x1="160" y1="130" x2="160" y2="150" stroke="#444" stroke-width="3"/>
  <line x1="160" y1="160" x2="160" y2="170" stroke="#444" stroke-width="3"/>
  <!-- Paddles -->
  <rect x="15" y="65" width="12" height="50" rx="4" fill="white"/>
  <rect x="293" y="65" width="12" height="50" rx="4" fill="white"/>
  <!-- Ball with glow -->
  <circle cx="160" cy="90" r="10" fill="white" opacity="0.3"/>
  <circle cx="160" cy="90" r="8" fill="white"/>
  <!-- Scores -->
  <text x="80" y="50" text-anchor="middle" font-family="monospace" font-size="36" font-weight="bold" fill="white">5</text>
  <text x="240" y="50" text-anchor="middle" font-family="monospace" font-size="36" font-weight="bold" fill="white">3</text>
  <!-- Title -->
  <text x="160" y="168" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="white">PONG</text>
</svg>
