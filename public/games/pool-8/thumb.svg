<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <!-- Wood frame -->
  <rect width="320" height="180" fill="#3d1f00" rx="8"/>
  <!-- Rail -->
  <rect x="18" y="18" width="284" height="144" fill="#145a32" rx="4"/>
  <!-- Felt -->
  <rect x="28" y="26" width="264" height="128" fill="#1a6b2e"/>
  <!-- Head line -->
  <line x1="94" y1="26" x2="94" y2="154" stroke="#28a048" stroke-width="0.8" opacity="0.4"/>
  <!-- Centre dot -->
  <circle cx="160" cy="90" r="3" fill="#28a048" opacity="0.5"/>
  <!-- Foot dot -->
  <circle cx="226" cy="90" r="3" fill="#28a048" opacity="0.5"/>
  <!-- Corner pockets -->
  <circle cx="28"  cy="26"  r="10" fill="#050505"/>
  <circle cx="292" cy="26"  r="10" fill="#050505"/>
  <circle cx="28"  cy="154" r="10" fill="#050505"/>
  <circle cx="292" cy="154" r="10" fill="#050505"/>
  <!-- Side pockets -->
  <circle cx="160" cy="26"  r="9" fill="#050505"/>
  <circle cx="160" cy="154" r="9" fill="#050505"/>
  <!-- Cue ball -->
  <circle cx="94" cy="90" r="9" fill="#fafafa"/>
  <circle cx="91" cy="87" r="3" fill="white" opacity="0.6"/>
  <!-- Rack balls (triangle) -->
  <circle cx="228" cy="90"  r="8" fill="#f5c400"/>
  <circle cx="246" cy="82"  r="8" fill="#f5c400" stroke="white" stroke-width="3"/>
  <circle cx="246" cy="98"  r="8" fill="#1a3fce"/>
  <circle cx="264" cy="74"  r="8" fill="#d62020"/>
  <circle cx="264" cy="90"  r="8" fill="#111111"/>
  <circle cx="264" cy="106" r="8" fill="#d62020" stroke="white" stroke-width="3"/>
  <circle cx="282" cy="66"  r="8" fill="#7c22c8" stroke="white" stroke-width="3"/>
  <circle cx="282" cy="82"  r="8" fill="#7c22c8"/>
  <circle cx="282" cy="98"  r="8" fill="#e85c00" stroke="white" stroke-width="3"/>
  <circle cx="282" cy="114" r="8" fill="#15822d"/>
  <!-- 8-ball label -->
  <circle cx="264" cy="90" r="8" fill="#111111"/>
  <text x="264" y="93.5" font-family="Arial" font-size="8" fill="white" text-anchor="middle" font-weight="bold">8</text>
  <!-- Title -->
  <text x="160" y="172" font-family="Arial" font-size="11" fill="#ffd700" text-anchor="middle" font-weight="bold">8-BALL POOL</text>
</svg>
