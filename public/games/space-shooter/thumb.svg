<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#020617"/>
  <!-- Stars -->
  <circle cx="30" cy="20" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="90" cy="50" r="1" fill="white" opacity="0.6"/>
  <circle cx="150" cy="15" r="2" fill="white" opacity="0.9"/>
  <circle cx="250" cy="35" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="320" cy="10" r="1" fill="white" opacity="0.5"/>
  <circle cx="380" cy="55" r="2" fill="white" opacity="0.8"/>
  <circle cx="60" cy="100" r="1" fill="white" opacity="0.4"/>
  <circle cx="340" cy="80" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="200" cy="200" r="1" fill="white" opacity="0.3"/>
  <circle cx="10" cy="180" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="390" cy="160" r="1" fill="white" opacity="0.6"/>
  <!-- Alien enemies row -->
  <ellipse cx="80" cy="70" rx="28" ry="18" fill="#7c3aed"/>
  <ellipse cx="80" cy="66" rx="18" ry="10" fill="#8b5cf6"/>
  <circle cx="72" cy="66" r="4" fill="#c4b5fd"/>
  <circle cx="88" cy="66" r="4" fill="#c4b5fd"/>
  <line x1="60" y1="78" x2="52" y2="88" stroke="#7c3aed" stroke-width="3"/>
  <line x1="100" y1="78" x2="108" y2="88" stroke="#7c3aed" stroke-width="3"/>
  <ellipse cx="200" cy="70" rx="28" ry="18" fill="#dc2626"/>
  <ellipse cx="200" cy="66" rx="18" ry="10" fill="#ef4444"/>
  <circle cx="192" cy="66" r="4" fill="#fca5a5"/>
  <circle cx="208" cy="66" r="4" fill="#fca5a5"/>
  <line x1="180" y1="78" x2="172" y2="88" stroke="#dc2626" stroke-width="3"/>
  <line x1="220" y1="78" x2="228" y2="88" stroke="#dc2626" stroke-width="3"/>
  <ellipse cx="320" cy="70" rx="28" ry="18" fill="#0891b2"/>
  <ellipse cx="320" cy="66" rx="18" ry="10" fill="#22d3ee"/>
  <circle cx="312" cy="66" r="4" fill="#a5f3fc"/>
  <circle cx="328" cy="66" r="4" fill="#a5f3fc"/>
  <line x1="300" y1="78" x2="292" y2="88" stroke="#0891b2" stroke-width="3"/>
  <line x1="340" y1="78" x2="348" y2="88" stroke="#0891b2" stroke-width="3"/>
  <!-- Laser beams -->
  <rect x="78" y="90" width="4" height="40" rx="2" fill="#fbbf24" opacity="0.8"/>
  <rect x="198" y="90" width="4" height="60" rx="2" fill="#fbbf24" opacity="0.8"/>
  <!-- Player ship -->
  <polygon points="200,240 176,270 224,270" fill="#38bdf8"/>
  <polygon points="200,240 186,260 214,260" fill="#7dd3fc"/>
  <rect x="195" y="260" width="10" height="6" rx="2" fill="#f97316"/>
  <!-- Wings -->
  <polygon points="176,270 156,278 172,256" fill="#0ea5e9"/>
  <polygon points="224,270 244,278 228,256" fill="#0ea5e9"/>
  <!-- Engine glow -->
  <ellipse cx="200" cy="273" rx="10" ry="6" fill="#f97316" opacity="0.7"/>
  <ellipse cx="200" cy="276" rx="6" ry="4" fill="#fef08a" opacity="0.9"/>
  <!-- Player laser -->
  <rect x="197" y="180" width="6" height="60" rx="3" fill="#38bdf8"/>
  <!-- Explosion -->
  <circle cx="80" cy="135" r="14" fill="#f97316" opacity="0.9"/>
  <circle cx="80" cy="135" r="8" fill="#fef08a"/>
  <!-- Score HUD -->
  <text x="20" y="290" fill="#38bdf8" font-family="Arial" font-size="14" font-weight="bold">SCORE: 1850</text>
  <text x="380" y="290" text-anchor="end" fill="#38bdf8" font-family="Arial" font-size="14" font-weight="bold">LIVES: ♥♥♥</text>
  <!-- Title overlay -->
  <text x="200" y="200" text-anchor="middle" fill="#38bdf8" font-family="Arial, sans-serif" font-size="26" font-weight="bold" letter-spacing="3" opacity="0.9">SPACE SHOOTER</text>
</svg>
