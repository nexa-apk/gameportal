  <rect x="122" y="222" width="38" height="36" rx="2" fill="#ef4444"/>
  <rect x="162" y="222" width="38" height="36" rx="2" fill="#3b82f6"/>
  <rect x="202" y="222" width="38" height="36" rx="2" fill="#22c55e"/>
  <rect x="242" y="222" width="36" height="36" rx="2" fill="#f59e0b"/>
  <rect x="122" y="184" width="38" height="36" rx="2" fill="#a855f7"/>
  <rect x="162" y="184" width="38" height="36" rx="2" fill="#ef4444"/>
  <rect x="202" y="184" width="38" height="36" rx="2" fill="#3b82f6"/>
  <rect x="242" y="184" width="36" height="36" rx="2" fill="#22c55e"/>
  <rect x="122" y="146" width="38" height="36" rx="2" fill="#f59e0b"/>
  <rect x="162" y="146" width="38" height="36" rx="2" fill="#a855f7"/>
  <rect x="202" y="146" width="78" height="36" rx="2" fill="#ef4444"/>
