  <rect x="162" y="98" width="38" height="36" rx="2" fill="#06b6d4" opacity="0.9"/>
  <rect x="162" y="136" width="38" height="8" rx="2" fill="#06b6d4" opacity="0.5"/>
  <!-- Title -->
  <text x="200" y="285" text-anchor="middle" fill="#06b6d4" font-family="Arial, sans-serif" font-size="28" font-weight="bold" letter-spacing="4">TETRIS</text>
