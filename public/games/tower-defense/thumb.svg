<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180">
  <rect width="320" height="180" fill="#1a3d1a"/>
  <!-- Grid -->
  <rect x="0" y="0" width="320" height="180" fill="#2d5a27"/>
  <!-- Path -->
  <rect x="0" y="80" width="200" height="30" fill="#8b7355"/>
  <rect x="170" y="20" width="30" height="90" fill="#8b7355"/>
  <rect x="170" y="20" width="150" height="30" fill="#8b7355"/>
  <!-- Towers -->
  <rect x="60" y="50" width="30" height="30" rx="3" fill="#2255bb"/>
  <rect x="66" y="56" width="18" height="18" fill="#4488ff"/>
  <rect x="130" y="115" width="30" height="30" rx="3" fill="#2255bb"/>
  <rect x="136" y="121" width="18" height="18" fill="#4488ff"/>
  <rect x="230" y="55" width="30" height="30" rx="3" fill="#2255bb"/>
  <rect x="236" y="61" width="18" height="18" fill="#4488ff"/>
  <!-- Enemies (red dots on path) -->
  <circle cx="40" cy="95" r="10" fill="#ff4444"/>
  <rect x="30" y="82" width="20" height="4" fill="#333"/>
  <rect x="30" y="82" width="16" height="4" fill="#44ff44"/>
  <circle cx="100" cy="95" r="10" fill="#ff4444"/>
  <circle cx="155" cy="95" r="10" fill="#ff8800"/>
  <!-- Bullets -->
  <circle cx="85" cy="76" r="4" fill="#ffff00"/>
  <circle cx="155" cy="135" r="4" fill="#ffff00"/>
  <!-- Gold indicator -->
  <text x="10" y="170" font-family="monospace" font-size="14" fill="#ffdd00">Gold: 150</text>
  <text x="160" y="175" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#44ff44">TOWER DEFENSE</text>
</svg>
