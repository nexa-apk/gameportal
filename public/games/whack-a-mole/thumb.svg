<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180">
  <rect width="320" height="180" fill="#2d5016"/>
  <!-- Grass background -->
  <rect x="0" y="130" width="320" height="50" fill="#3a6b1a"/>
  <!-- Holes (3x2 grid) -->
  <ellipse cx="80" cy="130" rx="40" ry="14" fill="#1a0d00"/>
  <ellipse cx="80" cy="127" rx="35" ry="10" fill="#2d1a00"/>
  <ellipse cx="160" cy="130" rx="40" ry="14" fill="#1a0d00"/>
  <ellipse cx="160" cy="127" rx="35" ry="10" fill="#2d1a00"/>
  <ellipse cx="240" cy="130" rx="40" ry="14" fill="#1a0d00"/>
  <ellipse cx="240" cy="127" rx="35" ry="10" fill="#2d1a00"/>
  <!-- Mole up (center hole) -->
  <ellipse cx="160" cy="110" rx="28" ry="32" fill="#6b4226"/>
  <ellipse cx="160" cy="103" rx="20" ry="22" fill="#c8916c"/>
  <circle cx="150" cy="97" r="5" fill="#000"/>
  <circle cx="170" cy="97" r="5" fill="#000"/>
  <circle cx="152" cy="95" r="2" fill="#fff"/>
  <circle cx="172" cy="95" r="2" fill="#fff"/>
  <ellipse cx="160" cy="103" rx="7" ry="5" fill="#ff6666"/>
  <rect x="154" y="108" width="5" height="6" fill="#fff"/>
  <rect x="161" y="108" width="5" height="6" fill="#fff"/>
  <!-- Whack hammer -->
  <rect x="215" y="65" width="20" height="40" rx="4" fill="#8b5e3c" transform="rotate(-30 225 85)"/>
  <rect x="205" y="60" width="40" height="28" rx="6" fill="#cc4444" transform="rotate(-30 225 74)"/>
  <!-- Score -->
  <text x="10" y="25" font-family="monospace" font-size="20" font-weight="bold" fill="#ffdd00">Score: 80</text>
  <text x="250" y="25" font-family="monospace" font-size="16" fill="white">⏱ 22s</text>
  <text x="160" y="173" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#7cba2d">WHACK-A-MOLE</text>
</svg>
